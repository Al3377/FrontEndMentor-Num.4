<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="flex-group">
      <div class="gradient-background">&nbsp;</div>
      <div class="white-background">
        <div class="form grid-group">
          <label for="name" class="form__label">cardholder name</label
          ><input
            type="text"
            class="form__input-box"
            id="name"
            placeholder="e.g. Jane Appleaseed"
          />
          <label for="card-number" class="form__label">card number</label
          ><input
            type="number"
            class="form__input-box"
            placeholder="e.g. 1234 5678 9123 0000"
            id="card-number"
          />

          <div class="form__label-group">
            <label for="date" class="form__label form__label--margin"
              >exp.date (mm/yy)</label
            >
            <label for="cvc" class="form__label">cvc</label>
          </div>

          <div class="form__date-cvc-group">
            <input
              type="text"
              class="form__input-box form__input-box--date"
              id="date"
              placeholder="MM"
            />
            <input
              type="number"
              class="form__input-box form__input-box--date"
              id="date"
              placeholder="YY"
            />
            <input
              type="text"
              class="form__input-box form__input-box--cvc"
              id="cvc"
              placeholder="e.g. 123"
            />
          </div>
          <button class="btn">Confirm</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card__front">
        <div class="card__front--logo">
          <img src="images/card-logo.svg" alt="card-logo" />
        </div>
        <div class="card__front--number">0000 0000 0000 0000</div>
        <div class="name-date-group">
          <div class="card__front--name">Jane Appleseed</div>
          <div class="card__front--date">
            <span id="month">00</span>/<span id="year">00</span>
          </div>
        </div>
      </div>
      <div class="card__back">
        <div class="card__back--cvc">000</div>
      </div>
    </div>
  </body>
</html>
